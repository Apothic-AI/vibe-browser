name: ci

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cache rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: install linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: build frontend
        run: pnpm build

      - name: run rust tests
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml

      - name: build tauri app
        run: pnpm tauri build --no-bundle

  tag-version:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: read and validate app version
        id: version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO_VERSION=$(python -c "import tomllib; print(tomllib.load(open('src-tauri/Cargo.toml', 'rb'))['package']['version'])")

          echo "package=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$PACKAGE_VERSION" != "$TAURI_VERSION" ]; then
            echo "package.json version ($PACKAGE_VERSION) does not match src-tauri/tauri.conf.json ($TAURI_VERSION)" >&2
            exit 1
          fi

          if [ "$PACKAGE_VERSION" != "$CARGO_VERSION" ]; then
            echo "package.json version ($PACKAGE_VERSION) does not match src-tauri/Cargo.toml ($CARGO_VERSION)" >&2
            exit 1
          fi

      - name: create tag if missing
        env:
          VERSION: ${{ steps.version.outputs.package }}
        shell: bash
        run: |
          git fetch --tags origin
          TAG="v$VERSION"

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists; skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
